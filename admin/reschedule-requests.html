<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reschedule - Admin Jalankebromo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/admin.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { brand: { orange: '#F28C28' } }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };
    </script>
  </head>
  <body data-admin-page="reschedule" data-admin-title="Pengajuan Reschedule">
    <div id="admin-page-content">
      <p class="mb-4 text-sm text-neutral-500">
        Pelanggan mengajukan ubah tanggal trip. Setujui untuk memperbarui jadwal, atau tolak jika tidak memungkinkan.
      </p>
      <div class="mb-4 flex flex-wrap gap-2">
        <button type="button" data-reschedule-filter="pending" class="rounded-lg bg-brand-orange px-4 py-2 text-sm font-semibold text-white">Menunggu</button>
        <button type="button" data-reschedule-filter="approved" class="rounded-lg border px-4 py-2 text-sm font-medium hover:bg-neutral-50">Disetujui</button>
        <button type="button" data-reschedule-filter="rejected" class="rounded-lg border px-4 py-2 text-sm font-medium hover:bg-neutral-50">Ditolak</button>
        <button type="button" data-reschedule-filter="all" class="rounded-lg border px-4 py-2 text-sm font-medium hover:bg-neutral-50">Semua</button>
      </div>
      <div class="overflow-hidden rounded-xl border border-neutral-200 bg-white shadow-sm">
        <table class="admin-table w-full text-sm">
          <thead class="border-b bg-neutral-50 text-left">
            <tr>
              <th class="px-5 py-3">Kode</th>
              <th class="px-5 py-3">Nama</th>
              <th class="px-5 py-3">Produk</th>
              <th class="px-5 py-3">Tanggal lama → baru</th>
              <th class="px-5 py-3">Diajukan</th>
              <th class="px-5 py-3">Status</th>
              <th class="px-5 py-3 text-right">Aksi</th>
            </tr>
          </thead>
          <tbody id="reschedule-tbody" class="divide-y">
            <tr><td colspan="7" class="px-5 py-8 text-center text-sm text-neutral-500">Memuat...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <script src="../js/api-config.js"></script>
    <script src="./js/admin-api.js"></script>
    <script src="./js/admin-toast.js"></script>
    <script src="./js/admin-auth.js"></script>
    <script src="./js/admin-shell.js"></script>
    <script src="./js/admin-pages.js"></script>
    <script src="./js/admin-ui.js"></script>
  </body>
</html>
