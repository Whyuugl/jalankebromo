<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Pesanan - Admin Jalankebromo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/admin.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { brand: { orange: '#F28C28' } }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };
    </script>
  </head>
  <body data-admin-page="pesanan" data-admin-title="Detail Pesanan" data-order-detail>
    <div id="admin-page-content">
      <a href="./pesanan.html" class="mb-4 inline-flex text-sm text-brand-orange hover:underline">&larr; Kembali ke daftar pesanan</a>
      <div class="grid gap-6 lg:grid-cols-3">
        <div class="space-y-6 lg:col-span-2">
          <section class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
            <h2 class="font-semibold text-neutral-900">Informasi Pelanggan</h2>
            <dl class="mt-4 grid gap-3 text-sm sm:grid-cols-2">
              <div><dt class="text-neutral-500">Nama</dt><dd class="font-medium" data-f="customer-name">—</dd></div>
              <div><dt class="text-neutral-500">Email</dt><dd class="font-medium" data-f="email">—</dd></div>
              <div><dt class="text-neutral-500">Telepon</dt><dd class="font-medium" data-f="phone">—</dd></div>
              <div><dt class="text-neutral-500">Kota</dt><dd class="font-medium" data-f="city">—</dd></div>
            </dl>
          </section>
          <section class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
            <h2 class="font-semibold text-neutral-900">Detail Pemesanan</h2>
            <dl class="mt-4 grid gap-3 text-sm sm:grid-cols-2">
              <div><dt class="text-neutral-500">Produk</dt><dd class="font-medium" data-f="product">—</dd></div>
              <div><dt class="text-neutral-500">Tanggal trip</dt><dd class="font-medium" data-f="trip-date">—</dd></div>
              <div><dt class="text-neutral-500">Peserta / Hari</dt><dd class="font-medium" data-f="participants">—</dd></div>
            </dl>
          </section>
        </div>
        <aside class="space-y-4">
          <div class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
            <p class="text-sm text-neutral-500">Status</p>
            <select id="order-status" class="mt-2 w-full rounded-lg border border-neutral-200 px-3 py-2 text-sm">
              <option value="pending">Menunggu pembayaran</option>
              <option value="dp_paid">Lunas DP (30%)</option>
              <option value="paid">Lunas penuh</option>
              <option value="completed">Selesai</option>
              <option value="cancelled">Batal</option>
            </select>
            <button type="button" id="save-order-status" class="mt-4 w-full rounded-lg bg-brand-orange py-2.5 text-sm font-semibold text-white hover:brightness-95">Simpan Status</button>
          </div>
          <div class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm text-sm">
            <div class="flex justify-between"><span>Subtotal</span><span data-f="subtotal">—</span></div>
            <div class="mt-2 flex justify-between text-emerald-600"><span>DP</span><span data-f="dp">—</span></div>
            <div class="mt-3 flex justify-between border-t pt-3 font-semibold"><span>Sisa tagihan</span><span data-f="remaining">—</span></div>
          </div>
        </aside>
      </div>
    </div>
    <script src="../js/api-config.js"></script>
    <script src="./js/admin-api.js"></script>
    <script src="./js/admin-toast.js"></script>
    <script src="./js/admin-auth.js"></script>
    <script src="./js/admin-shell.js"></script>
    <script src="./js/admin-pages.js"></script>
  </body>
</html>
