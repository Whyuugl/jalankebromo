<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengaturan - Admin Jalankebromo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/admin.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { brand: { orange: '#F28C28' } }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };
    </script>
  </head>
  <body data-admin-page="pengaturan" data-admin-title="Pengaturan">
    <div id="admin-page-content">
      <form data-admin-entity="settings" class="max-w-2xl space-y-8">
        <section class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
          <h2 class="font-semibold text-neutral-900">Informasi Perusahaan</h2>
          <div class="mt-4 space-y-4">
            <div><label class="text-sm font-medium">Nama brand</label><input name="brand_name" class="mt-2 w-full rounded-lg border px-3 py-2 text-sm" /></div>
            <div><label class="text-sm font-medium">Deskripsi footer</label><textarea name="footer_description" rows="3" class="mt-2 w-full rounded-lg border px-3 py-2 text-sm"></textarea></div>
          </div>
        </section>
        <section class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
          <h2 class="font-semibold text-neutral-900">Kontak</h2>
          <div class="mt-4 grid gap-4 sm:grid-cols-2">
            <div><label class="text-sm font-medium">WhatsApp</label><input name="contact_whatsapp" class="mt-2 w-full rounded-lg border px-3 py-2 text-sm" /></div>
            <div><label class="text-sm font-medium">Telepon kantor</label><input name="contact_phone" class="mt-2 w-full rounded-lg border px-3 py-2 text-sm" /></div>
            <div class="sm:col-span-2"><label class="text-sm font-medium">Email</label><input name="contact_email" type="email" class="mt-2 w-full rounded-lg border px-3 py-2 text-sm" /></div>
          </div>
        </section>
        <section class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
          <h2 class="font-semibold text-neutral-900">Sosial Media</h2>
          <div class="mt-4"><label class="text-sm font-medium">Instagram URL</label><input name="instagram_url" class="mt-2 w-full rounded-lg border px-3 py-2 text-sm" /></div>
        </section>
        <button type="submit" class="rounded-lg bg-brand-orange px-6 py-2.5 text-sm font-semibold text-white hover:brightness-95">Simpan Pengaturan</button>
      </form>
    </div>
    <script src="../js/api-config.js"></script>
    <script src="./js/admin-api.js"></script>
    <script src="./js/admin-toast.js"></script>
    <script src="./js/admin-auth.js"></script>
    <script src="./js/admin-shell.js"></script>
    <script src="./js/admin-forms.js"></script>
  </body>
</html>
